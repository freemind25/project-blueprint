name: CI/CD UnRobot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

    - name: Run Tests
      run: npm test || echo "No tests defined yet"

    # Optionnel: Déploiement (ex: Vercel ou Netlify)
    # - name: Deploy
    #   if: github.ref == 'refs/heads/main'
    #   run: ...
